# Smoke-test config: tiny subset, 1+1 epochs — proves the train/eval pipeline
# runs end-to-end on the GPU before committing to a full baseline run.
seed: 42

paths:
  data_root: /data/car-price-vision
  manifest_csv: /data/car-price-vision/manifest.csv
  out_dir: /data/car-price-vision/outputs/smoke
  checkpoint_dir: /data/car-price-vision/checkpoints/smoke
  log_dir: /data/car-price-vision/outputs/smoke/logs

target_norm:
  year_mean: 2012.3723
  year_std: 4.4677
  log_price_mean: 9.0403
  log_price_std: 0.9975

data:
  img_size: 224
  subset_size: 3000
  num_workers: 4
  split_mode: by_model
  holdout_models_frac: 0.1
  val_frac: 0.1
  test_frac: 0.1

model:
  backbone: convnext_tiny
  pretrained: true
  head_hidden_dim: 256
  head_dropout: 0.2

loss:
  huber_delta: 1.0
  weight_year: 1.0
  weight_price: 1.0

train:
  batch_size: 32
  stage1:
    epochs: 1
    lr: 1.0e-3
  stage2:
    epochs: 1
    lr: 1.0e-4
    unfreeze_last_n_blocks: 1
  weight_decay: 1.0e-4
  grad_clip_norm: 1.0
  amp: true
  checkpoint_every_epochs: 1
  log_every_steps: 20

eval:
  batch_size: 64
