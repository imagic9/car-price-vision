<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>car-price-vision demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      max-width: 640px;
      margin: 3rem auto;
      padding: 0 1rem;
      color: #1a1a1a;
    }
    h1 { font-size: 1.4rem; }
    .card {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 1.25rem;
      margin-top: 1.5rem;
    }
    button {
      background: #1a1a1a;
      color: white;
      border: none;
      padding: 0.6rem 1.2rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
    }
    button:disabled { background: #999; cursor: not-allowed; }
    pre {
      background: #f5f5f5;
      padding: 1rem;
      border-radius: 6px;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }
    img.gradcam { max-width: 100%; border-radius: 6px; margin-top: 1rem; }
    .muted { color: #666; font-size: 0.9rem; }
  </style>
</head>
<body>
  <h1>car-price-vision — demo</h1>
  <p class="muted">
    Upload a photo of a car to get a predicted manufacture year, an estimated
    price in GBP, and a Grad-CAM overlay showing what the model looked at.
    See the project README for context and limitations.
  </p>

  <div class="card">
    <input type="file" id="fileInput" accept="image/*" />
    <br /><br />
    <button id="predictBtn">Predict</button>
    <p id="status" class="muted"></p>
  </div>

  <div class="card" id="resultCard" style="display: none;">
    <h2>Result</h2>
    <pre id="resultJson"></pre>
    <img id="gradcamImg" class="gradcam" style="display: none;" alt="Grad-CAM overlay" />
  </div>

  <script>
    const fileInput = document.getElementById("fileInput");
    const predictBtn = document.getElementById("predictBtn");
    const statusEl = document.getElementById("status");
    const resultCard = document.getElementById("resultCard");
    const resultJson = document.getElementById("resultJson");
    const gradcamImg = document.getElementById("gradcamImg");

    predictBtn.addEventListener("click", async () => {
      const file = fileInput.files[0];
      if (!file) {
        statusEl.textContent = "Choose an image first.";
        return;
      }

      predictBtn.disabled = true;
      statusEl.textContent = "Predicting...";
      resultCard.style.display = "none";
      gradcamImg.style.display = "none";

      const formData = new FormData();
      formData.append("file", file);

      try {
        const response = await fetch("/predict", { method: "POST", body: formData });
        const data = await response.json();

        if (!response.ok) {
          statusEl.textContent = `Error: ${data.detail || response.statusText}`;
          predictBtn.disabled = false;
          return;
        }

        // Show the JSON response, but keep the (possibly large) base64 image
        // out of the printed block for readability.
        const { gradcam_png_base64, ...displayData } = data;
        resultJson.textContent = JSON.stringify(displayData, null, 2);
        resultCard.style.display = "block";

        if (gradcam_png_base64) {
          gradcamImg.src = `data:image/png;base64,${gradcam_png_base64}`;
          gradcamImg.style.display = "block";
        }

        statusEl.textContent = "Done.";
      } catch (err) {
        statusEl.textContent = `Request failed: ${err}`;
      } finally {
        predictBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
